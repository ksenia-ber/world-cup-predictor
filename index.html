<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЧМ 2026 — Семейные прогнозы</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0e1a; color: #e0e0e0; min-height: 100vh; }

  .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); padding: 20px; text-align: center; border-bottom: 3px solid #e94560; }
  .header h1 { font-size: 24px; color: #fff; margin-bottom: 4px; }
  .header p { color: #aaa; font-size: 13px; }
  .status-bar { display: flex; justify-content: center; gap: 16px; margin-top: 8px; font-size: 11px; color: #666; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }
  .status-live { background: #4caf50; animation: pulse 1.5s infinite; }
  .status-off { background: #666; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .container { max-width: 900px; margin: 0 auto; padding: 16px; }

  .tabs { display: flex; gap: 6px; margin-bottom: 16px; }
  .tab { padding: 8px 16px; border: 1px solid #333; background: #151525; border-radius: 8px; cursor: pointer; font-size: 13px; color: #aaa; transition: all 0.2s; }
  .tab.active { background: #e94560; color: #fff; border-color: #e94560; }
  .tab:hover:not(.active) { background: #1e1e35; color: #fff; }

  .panel { display: none; }
  .panel.active { display: block; }

  .round-label { font-size: 14px; color: #e94560; margin: 16px 0 4px; padding-bottom: 4px; border-bottom: 1px solid #222; }
  .stage-label { font-size: 11px; color: #888; margin: 2px 0 6px; padding-left: 2px; }

  .match { background: #151525; border-radius: 10px; margin-bottom: 8px; border: 1px solid #222; overflow: hidden; }
  .match.live { border-color: #4caf50; box-shadow: 0 0 10px rgba(76,175,80,0.12); }
  .match.placeholder { opacity: 0.4; border-style: dashed; }

  .match-top { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; gap: 8px; flex-wrap: wrap; }
  .match-teams { font-size: 14px; font-weight: 600; }
  .match-score { font-size: 18px; font-weight: 700; margin: 0 8px; }
  .match-score.live-score { color: #4caf50; }
  .match-meta { display: flex; gap: 8px; align-items: center; font-size: 11px; color: #888; }
  .live-badge { background: #4caf50; color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; animation: pulse 1.5s infinite; }
  .finished-badge { background: #333; color: #aaa; padding: 2px 8px; border-radius: 10px; font-size: 10px; }
  .vs { color: #555; margin: 0 6px; }

  .preds { display: flex; flex-wrap: wrap; border-top: 1px solid #1a1a2e; }
  .pred { flex: 1 1 calc(16.66%); min-width: 70px; padding: 6px 4px; text-align: center; border-right: 1px solid #1a1a2e; }
  .pred:last-child { border-right: none; }
  .pred-name { color: #888; margin-bottom: 2px; font-size: 10px; }
  .pred-score { font-weight: 700; font-size: 13px; }
  .pred-pts { font-size: 10px; font-weight: 600; margin-left: 2px; }
  .pts-3 { color: #4caf50; }
  .pts-2 { color: #ff9800; }
  .pts-1 { color: #ce93d8; }
  .pts-0 { color: #555; }
  .pred-empty { color: #333; }

  .leaderboard { background: #151525; border-radius: 12px; overflow: hidden; max-width: 500px; }
  .lb-header { display: grid; grid-template-columns: 28px 1fr 36px 36px 36px 36px 50px; padding: 10px 12px; background: #1a1a2e; font-size: 11px; color: #888; font-weight: 600; }
  .lb-row { display: grid; grid-template-columns: 28px 1fr 36px 36px 36px 36px 50px; padding: 10px 12px; border-top: 1px solid #222; align-items: center; }
  .lb-row:hover { background: #1a1a2e; }
  .lb-rank { font-weight: 700; font-size: 16px; }
  .lb-rank.gold { color: #ffd700; }
  .lb-rank.silver { color: #c0c0c0; }
  .lb-rank.bronze { color: #cd7f32; }
  .lb-name { font-weight: 600; font-size: 14px; }
  .lb-pts { text-align: center; font-size: 13px; }
  .lb-total { text-align: center; font-size: 18px; font-weight: 700; color: #e94560; }

  .breakdown-wrap { margin-top: 24px; overflow-x: auto; }
  .breakdown-title { font-size: 13px; font-weight: 600; color: #888; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .breakdown-table { border-collapse: collapse; font-size: 12px; min-width: 100%; }
  .breakdown-table th { background: #1a1a2e; color: #888; font-weight: 600; padding: 7px 10px; text-align: center; white-space: nowrap; border: 1px solid #222; }
  .breakdown-table th.match-col { text-align: left; min-width: 155px; }
  .breakdown-table td { padding: 6px 10px; border: 1px solid #1e1e3a; text-align: center; white-space: nowrap; background: #0d0d1a; }
  .breakdown-table td.match-info { text-align: left; color: #ccc; background: #111122; }
  .breakdown-table td.match-info .mi-teams { font-weight: 600; font-size: 12px; }
  .breakdown-table td.match-info .mi-score { font-size: 11px; color: #888; margin-top: 1px; }
  .breakdown-table tr:hover td { background: #13132a; }
  .breakdown-table tr:hover td.match-info { background: #15152e; }
  .bd-3 { color: #4caf50; font-weight: 700; }
  .bd-2 { color: #ff9800; font-weight: 700; }
  .bd-1 { color: #2196f3; font-weight: 700; }
  .bd-0 { color: #444; }
  .bd-none { color: #2a2a3a; }

  .scoring-info { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; font-size: 12px; color: #888; }
  .scoring-info span { display: flex; align-items: center; gap: 4px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot-3 { background: #4caf50; }
  .dot-2 { background: #ff9800; }
  .dot-1 { background: #9c27b0; }

  /* Bracket */
  .bracket-wrap { overflow-x: auto; padding-bottom: 16px; }
  .bracket { display: flex; align-items: stretch; min-width: 850px; }
  .bracket-header { display: flex; min-width: 850px; }
  .bracket-header span { min-width: 135px; flex-shrink: 0; text-align: center; font-size: 10px; color: #e94560; font-weight: 600; padding: 4px 0; }
  .bracket-round { display: flex; flex-direction: column; justify-content: space-around; min-width: 135px; flex-shrink: 0; }
  .bracket-match { background: #151525; border: 1px solid #222; border-radius: 5px; margin: 3px 4px; font-size: 11px; overflow: hidden; }
  .bracket-match.live { border-color: #4caf50; }
  .bracket-match.placeholder { opacity: 0.35; border-style: dashed; }
  .bm-team { display: flex; align-items: center; padding: 4px 6px; gap: 3px; }
  .bm-team:first-child { border-bottom: 1px solid #1a1a2e; }
  .bm-flag { font-size: 12px; line-height: 1; }
  .bm-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 11px; }
  .bm-score { font-weight: 700; font-size: 11px; min-width: 12px; text-align: right; }
  .bm-score.live-sc { color: #4caf50; }
  .bm-winner .bm-name { font-weight: 700; }
  .bm-loser { opacity: 0.45; }

  @media (max-width: 600px) {
    .match-top { padding: 8px 10px; }
    .match-teams { font-size: 13px; }
    .pred { min-width: 55px; padding: 5px 2px; }
    .pred-name { font-size: 9px; }
    .pred-score { font-size: 11px; }
    .lb-header, .lb-row { grid-template-columns: 28px 1fr 36px 36px 36px 36px 46px; font-size: 10px; padding: 8px 10px; }
    .header h1 { font-size: 20px; }
  }
</style>
</head>

function flag(enName) { return FLAGS[enName]||''; }

const ROUND_MAP = {'r32':'1/16 финала','r16':'1/8 финала','qf':'Четвертьфинал','sf':'Полуфинал','third':'Матч за 3-е место','final':'Финал'};
const STADIUM_UTC = {'1':-5,'2':-5,'3':-5,'4':-5,'5':-5,'6':-5,'7':-4,'8':-4,'9':-4,'10':-4,'11':-4,'12':-4,'13':-7,'14':-7,'15':-7,'16':-7};

function tr(n) { return TEAM_RU[n]||n; }
function trL(l) { return l ? l.replace(/Winner Match (\d+)/,'Побед. м.$1').replace(/Loser Match (\d+)/,'Проигр. м.$1') : '?'; }

function toUTC(d, sid) {
  const m = d.match(/(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2})/);
  if (!m) return 0;
  return Date.UTC(+m[3],+m[1]-1,+m[2],+m[4]-(STADIUM_UTC[String(sid)]||-4),+m[5]);
}

function fmt(ms) {
  if (!ms) return '';
  const d = new Date(ms);
  const mo = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
  return d.getDate()+' '+mo[d.getMonth()]+', '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

function pts(ph,pa,ah,aa) {
  ph=+ph;pa=+pa;ah=+ah;aa=+aa;
  if ([ph,pa,ah,aa].some(isNaN)) return null;
  if (ph===ah&&pa===aa) return 3;
  const po=Math.sign(ph-pa), ao=Math.sign(ah-aa);
  if (po!==ao) return 0;
  if ((ph-pa)===(ah-aa)) return 2;
  return 1;
}

let matches = [], allKO = [];

function showTab(name) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
  document.getElementById('match-filters').style.display = (name==='matches') ? '' : 'none';
}

function card(m) {
  const isLive = m.elapsed&&m.elapsed!=='notstarted'&&!m.finished;
  const hasScore = m.hScore!=null&&m.aScore!=null&&(isLive||m.finished);
  const pr = PREDICTIONS[m.id];

  let badge = '';
  if (isLive) { const min = /^\d+$/.test(m.elapsed) ? m.elapsed+"'" : 'LIVE'; badge = `<span class="live-badge">${min}</span>`; }
  else if (m.finished) badge = `<span class="finished-badge">завершён</span>`;

  let sc = '<span class="vs">—</span>';
  if (hasScore || PEN_SCORES[m.id]) {
    const pen = PEN_SCORES[m.id];
    const cls = isLive ? ' live-score' : '';
    const ft = FT_SCORES[m.id];
    if (pen) {
      sc = `<span class="match-score${cls}">${m.hScore}<span style="font-size:12px;color:#aaa">(${pen[0]})</span> — ${m.aScore}<span style="font-size:12px;color:#aaa">(${pen[1]})</span></span>`;
    } else if (ft && (m.hScore!=ft[0]||m.aScore!=ft[1])) {
      sc = `<span class="match-score${cls}">${m.hScore}:${m.aScore}<span style="font-size:12px;color:#aaa"> (О.В. ${ft[0]}:${ft[1]})</span></span>`;
    } else {
      sc = `<span class="match-score${cls}">${m.hScore}:${m.aScore}</span>`;
    }
  }

  let h = `<div class="match ${isLive?'live':''} ${m.placeholder?'placeholder':''}">
    <div class="match-top">
      <div class="match-teams">${flag(m.homeEn)} ${m.home} ${sc} ${m.away} ${flag(m.awayEn)}</div>
      <div class="match-meta"><span>${fmt(m.utcMs)}</span>${badge}</div>
    </div>`;

  if (!m.placeholder) {
    h += `<div class="preds">`;
    PLAYERS.forEach((p,i) => {
      const pred = pr&&pr[p];
      let pt = null;
      if (pred&&hasScore&&(m.finished||FT_SCORES[m.id])) { const ft=FT_SCORES[m.id]; pt = pts(pred[0],pred[1],ft?ft[0]:m.hScore,ft?ft[1]:m.aScore); }
      const ptH = pt!==null ? `<span class="pred-pts pts-${pt}">(${pt})</span>` : '';
      const sStr = pred ? `${pred[0]}:${pred[1]}` : '—';
      h += `<div class="pred"><div class="pred-name">${SHORT[i]}</div><span class="pred-score${pred?'':' pred-empty'}">${sStr}</span>${ptH}</div>`;
    });
    h += `</div>`;
  }
  return h + `</div>`;
}

function dateLabel(utcMs) {
  if (!utcMs) return '';
  const d = new Date(utcMs);
  const days = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  const mo = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  return days[d.getDay()] + ', ' + d.getDate() + ' ' + mo[d.getMonth()];
}

function dateKey(utcMs) {
  const d = new Date(utcMs);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function isToday(utcMs) {
  const now = new Date(), d = new Date(utcMs);
  return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth() && d.getDate()===now.getDate();
}

function render() {
  const rf = document.getElementById('round-filter').value;
  const filtered = matches.filter(m => rf==='all' || m.round===rf);
  const isLiveMatch = m => m.elapsed&&m.elapsed!=='notstarted'&&!m.finished;
  const isCurrent = m => !m.finished || isLiveMatch(m) || isToday(m.utcMs);
  const sf = document.getElementById('status-filter').value;
  const shown = sf==='current' ? filtered.filter(m => isCurrent(m)) : filtered.filter(m => !isCurrent(m)).slice().sort((a,b) => b.utcMs - a.utcMs);

  let html='', lastD='', lastSt='';
  shown.forEach(m => {
    const dk = dateKey(m.utcMs);
    if (dk!==lastD) { lastD=dk; lastSt=''; html+=`<div class="round-label">${dateLabel(m.utcMs)}</div>`; }
    if (m.round!==lastSt) { lastSt=m.round; html+=`<div class="stage-label">${m.round}</div>`; }
    html += card(m);
  });

  const empty = sf==='current' ? 'Нет текущих матчей' : 'Нет завершённых матчей';
  document.getElementById('panel-matches').innerHTML = html||`<p style="color:#666;text-align:center;padding:40px">${empty}</p>`;
  renderLB();
  renderBracket();
}

function renderLB() {
  const fin = matches.filter(m=>m.finished||FT_SCORES[m.id]);
  const st = PLAYERS.map(p => {
    let t=0,e=0,d=0,o=0,w=0;
    fin.forEach(m => {
      const pr = PREDICTIONS[m.id]&&PREDICTIONS[m.id][p];
      if (!pr) return;
      const ft=FT_SCORES[m.id]; const pt = pts(pr[0],pr[1],ft?ft[0]:m.hScore,ft?ft[1]:m.aScore);
      if(pt===3){e++;t+=3;}else if(pt===2){d++;t+=2;}else if(pt===1){o++;t+=1;}else if(pt===0){w++;}
    });
    return {name:SHORT[PLAYERS.indexOf(p)],t,e,d,o,w};
  }).sort((a,b)=>b.t-a.t||b.e-a.e||b.d-a.d||b.o-a.o||a.name.localeCompare(b.name,'ru'));

  let h = `<div class="scoring-info">
    <span><span class="dot dot-3"></span>3 — точный счёт</span>
    <span><span class="dot dot-2"></span>2 — исход + разница</span>
    <span><span class="dot dot-1"></span>1 — верный исход</span>
  </div><div class="leaderboard">
  <div class="lb-header"><div>#</div><div>Игрок</div><div style="text-align:center">3</div><div style="text-align:center">2</div><div style="text-align:center">1</div><div style="text-align:center">0</div><div style="text-align:center">Итого</div></div>`;
  st.forEach((s,i) => {
    const rc = i===0?'gold':i===1?'silver':i===2?'bronze':'';
    h += `<div class="lb-row"><div class="lb-rank ${rc}">${i+1}</div><div class="lb-name">${s.name}</div><div class="lb-pts">${s.e}</div><div class="lb-pts">${s.d}</div><div class="lb-pts">${s.o}</div><div class="lb-pts">${s.w}</div><div class="lb-total">${s.t}</div></div>`;
  });
  // Breakdown table
  const playerOrder = PLAYERS.map(p => SHORT[PLAYERS.indexOf(p)]);
  let bd = `<div class="breakdown-wrap"><div class="breakdown-title">Детальная разбивка</div><table class="breakdown-table"><thead><tr><th class="match-col">Матч</th>`;
  playerOrder.forEach(s => { bd += `<th>${s}</th>`; });
  bd += `</tr></thead><tbody>`;
  [...fin].sort((a,b)=>b.utcMs-a.utcMs).forEach(m => {
    const ft = FT_SCORES[m.id];
    const pen = PEN_SCORES[m.id];
    const hS = ft ? ft[0] : m.hScore, aS = ft ? ft[1] : m.aScore;
    let scoreStr = `${m.hScore}:${m.aScore}`;
    if (pen) scoreStr += ` (пен. ${pen[0]}:${pen[1]})`;
    else if (ft && (m.hScore!=ft[0]||m.aScore!=ft[1])) scoreStr += ` (О.В. ${ft[0]}:${ft[1]})`;
    bd += `<tr><td class="match-info"><div class="mi-teams">${flag(m.homeEn)||''} ${m.home} — ${m.away} ${flag(m.awayEn)||''}</div><div class="mi-score">${scoreStr}</div></td>`;
    PLAYERS.forEach(p => {
      const pr = PREDICTIONS[m.id]&&PREDICTIONS[m.id][p];
      if (!pr) { bd += `<td class="bd-none">—</td>`; return; }
      const pt = pts(pr[0],pr[1],hS,aS);
      const predStr = `${pr[0]}:${pr[1]}`;
      bd += `<td class="bd-${pt}" title="${predStr}">${predStr}<br><span style="font-size:10px">${pt>0?'+'+pt:'0'}</span></td>`;
    });
    bd += `</tr>`;
  });
  bd += `</tbody></table></div>`;

  document.getElementById('panel-leaderboard').innerHTML = h+'</div>'+bd;
}

function bmTeam(name, enName, score, penScore, isWinner, isLoser, isLive) {
  const f = flag(enName);
  const cls = isWinner?'bm-winner':isLoser?'bm-loser':'';
  const scCls = isLive?'live-sc':'';
  const penHtml = penScore!=null ? `<span style="font-size:9px;color:#aaa">(${penScore})</span>` : '';
  const sc = score!=null&&score!==''?`<span class="bm-score ${scCls}">${score}</span>${penHtml}`:'';
  return `<div class="bm-team ${cls}">${f?`<span class="bm-flag">${f}</span>`:''}<span class="bm-name">${name}</span>${sc}</div>`;
}

function bmCard(m) {
  if (!m) return '<div class="bracket-match placeholder"><div class="bm-team"><span class="bm-name">—</span></div><div class="bm-team"><span class="bm-name">—</span></div></div>';
  const isLive = m.elapsed&&m.elapsed!=='notstarted'&&!m.finished;
  const hasScore = m.hScore!=null&&m.aScore!=null&&(isLive||m.finished||PEN_SCORES[m.id]);
  const pen = PEN_SCORES[m.id];
  const hWin = hasScore&&(+m.hScore>+m.aScore||(pen&&pen[0]>pen[1]));
  const aWin = hasScore&&(+m.aScore>+m.hScore||(pen&&pen[1]>pen[0]));
  const cls = m.placeholder?'placeholder':isLive?'live':'';
  return `<div class="bracket-match ${cls}">${bmTeam(m.home,m.homeEn,hasScore?m.hScore:null,pen?pen[0]:null,hWin,aWin,isLive)}${bmTeam(m.away,m.awayEn,hasScore?m.aScore:null,pen?pen[1]:null,aWin,hWin,isLive)}</div>`;
}

function getM(id) { return allKO.find(m=>String(m.id)===String(id)); }

function renderBracket() {
  function col(ids) {
    let h = '<div class="bracket-round">';
    ids.forEach(id => { h += bmCard(getM(id)); });
    return h+'</div>';
  }

  // Left half: feeds into SF 101
  // QF97 ← R16-89(R32: 74,77) + R16-90(R32: 73,75)
  // QF98 ← R16-93(R32: 83,84) + R16-94(R32: 81,82)
  // All 16 R32 ordered so pairs feed into the correct R16
  // R16-89 ← 74,77 | R16-90 ← 73,75 | R16-91 ← 76,78 | R16-92 ← 79,80
  // R16-93 ← 83,84 | R16-94 ← 81,82 | R16-95 ← 86,88 | R16-96 ← 85,87
  // QF-97 ← 89,90 | QF-98 ← 93,94 | QF-99 ← 91,92 | QF-100 ← 95,96
  // SF-101 ← 97,98 | SF-102 ← 99,100
  let html = '<div class="bracket-wrap">';
  html += '<div class="bracket-header"><span>1/16</span><span>1/8</span><span>1/4</span><span>1/2</span><span></span></div>';
  html += '<div class="bracket">';
  html += col(['74','77','73','75','76','78','79','80','83','84','81','82','86','88','85','87']);
  html += col(['89','90','91','92','93','94','95','96']);
  html += col(['97','99','98','100']);
  html += col(['101','102']);
  // Final + 3rd place with labels
  let fin = '<div class="bracket-round" style="justify-content:center;gap:0">';
  fin += '<div style="font-size:9px;color:#e94560;text-align:center;padding:2px 0">Финал</div>';
  fin += bmCard(getM('104'));
  fin += '<div style="font-size:9px;color:#e94560;text-align:center;padding:6px 0 2px">3-е место</div>';
  fin += bmCard(getM('103'));
  fin += '</div>';
  html += fin;
  html += '</div></div>';
  document.getElementById('panel-bracket').innerHTML = html;
}

async function fetchAPI() {
  const dot=document.getElementById('api-dot'), st=document.getElementById('api-status'), up=document.getElementById('last-update');
  const px=[u=>u, u=>'https://corsproxy.io/?'+encodeURIComponent(u), u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u)];
  for (const p of px) {
    try {
      const r = await fetch(p('https://worldcup26.ir/get/games'),{signal:AbortSignal.timeout(8000)});
      if (!r.ok) continue;
      const d = await r.json();
      const g = Array.isArray(d)?d:(d.games||d.data||[]);
      if (!g.length) continue;
      allKO = g.filter(x=>ROUND_MAP[x.type]).map(x => {
        function realName(en,id) { return en&&!en.startsWith('Winner')&&!en.startsWith('Loser')&&!en.startsWith('TBD')&&id!=='0'&&id!==0; }
        const hReal = realName(x.home_team_name_en,x.home_team_id), aReal = realName(x.away_team_name_en,x.away_team_id);
        return {id:x.id||x._id, type:x.type, round:ROUND_MAP[x.type], home:hReal?tr(x.home_team_name_en):trL(x.home_team_label), away:aReal?tr(x.away_team_name_en):trL(x.away_team_label), homeEn:hReal?x.home_team_name_en:'', awayEn:aReal?x.away_team_name_en:'', utcMs:toUTC(x.local_date||'',x.stadium_id), hScore:x.home_score, aScore:x.away_score, finished:x.finished===true||x.finished==='TRUE'||x.finished==='true', elapsed:x.time_elapsed||'notstarted', placeholder:!hReal&&!aReal};
      });
      matches = allKO.slice().sort((a,b)=>a.utcMs-b.utcMs);
      dot.className='status-dot status-live'; up.textContent=fmt(Date.now());
      const hasLive = matches.some(m=>m.elapsed&&m.elapsed!=='notstarted'&&!m.finished);
      st.textContent = hasLive ? 'Live · авто-обновление' : 'Live';
      render();
      if (hasLive && !liveTimer) liveTimer = setInterval(fetchAPI, 60000);
      else if (!hasLive && liveTimer) { clearInterval(liveTimer); liveTimer = null; }
      return;
    } catch(e) {}
  }
  dot.className='status-dot status-off'; st.textContent='Офлайн';
}

let liveTimer = null;
fetchAPI();
</script>
