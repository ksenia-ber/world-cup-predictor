<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЧМ 2026 — Семейные прогнозы</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0e1a; color: #e0e0e0; min-height: 100vh; }

  .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); padding: 20px; text-align: center; border-bottom: 3px solid #e94560; }
  .header h1 { font-size: 24px; color: #fff; margin-bottom: 4px; }
  .header p { color: #aaa; font-size: 13px; }
  .status-bar { display: flex; justify-content: center; gap: 16px; margin-top: 8px; font-size: 11px; color: #666; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }
  .status-live { background: #4caf50; animation: pulse 1.5s infinite; }
  .status-off { background: #666; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .container { max-width: 900px; margin: 0 auto; padding: 16px; }

  .tabs { display: flex; gap: 6px; margin-bottom: 16px; }
  .tab { padding: 8px 16px; border: 1px solid #333; background: #151525; border-radius: 8px; cursor: pointer; font-size: 13px; color: #aaa; transition: all 0.2s; }
  .tab.active { background: #e94560; color: #fff; border-color: #e94560; }
  .tab:hover:not(.active) { background: #1e1e35; color: #fff; }

  .panel { display: none; }
  .panel.active { display: block; }

  .round-label { font-size: 14px; color: #e94560; margin: 16px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #222; }

  .match { background: #151525; border-radius: 10px; margin-bottom: 8px; border: 1px solid #222; overflow: hidden; }
  .match.live { border-color: #4caf50; box-shadow: 0 0 10px rgba(76,175,80,0.12); }
  .match.placeholder { opacity: 0.4; border-style: dashed; }

  .match-top { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; gap: 8px; flex-wrap: wrap; }
  .match-teams { font-size: 14px; font-weight: 600; }
  .match-score { font-size: 18px; font-weight: 700; margin: 0 8px; }
  .match-score.live-score { color: #4caf50; }
  .match-meta { display: flex; gap: 8px; align-items: center; font-size: 11px; color: #888; }
  .live-badge { background: #4caf50; color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; animation: pulse 1.5s infinite; }
  .finished-badge { background: #333; color: #aaa; padding: 2px 8px; border-radius: 10px; font-size: 10px; }
  .vs { color: #555; margin: 0 6px; }

  .preds { display: flex; flex-wrap: wrap; border-top: 1px solid #1a1a2e; }
  .pred { flex: 1 1 calc(16.66%); min-width: 70px; padding: 6px 4px; text-align: center; border-right: 1px solid #1a1a2e; }
  .pred:last-child { border-right: none; }
  .pred-name { color: #888; margin-bottom: 2px; font-size: 10px; }
  .pred-score { font-weight: 700; font-size: 13px; }
  .pred-pts { font-size: 10px; font-weight: 600; margin-left: 2px; }
  .pts-3 { color: #4caf50; }
  .pts-2 { color: #ff9800; }
  .pts-1 { color: #ce93d8; }
  .pts-0 { color: #555; }
  .pred-empty { color: #333; }

  .leaderboard { background: #151525; border-radius: 12px; overflow: hidden; }
  .lb-header { display: grid; grid-template-columns: 32px 1fr 50px 50px 50px 50px 60px; padding: 10px 14px; background: #1a1a2e; font-size: 11px; color: #888; font-weight: 600; }
  .lb-row { display: grid; grid-template-columns: 32px 1fr 50px 50px 50px 50px 60px; padding: 10px 14px; border-top: 1px solid #222; align-items: center; }
  .lb-row:hover { background: #1a1a2e; }
  .lb-rank { font-weight: 700; font-size: 16px; }
  .lb-rank.gold { color: #ffd700; }
  .lb-rank.silver { color: #c0c0c0; }
  .lb-rank.bronze { color: #cd7f32; }
  .lb-name { font-weight: 600; font-size: 14px; }
  .lb-pts { text-align: center; font-size: 13px; }
  .lb-total { text-align: center; font-size: 18px; font-weight: 700; color: #e94560; }

  .scoring-info { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; font-size: 12px; color: #888; }
  .scoring-info span { display: flex; align-items: center; gap: 4px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot-3 { background: #4caf50; }
  .dot-2 { background: #ff9800; }
  .dot-1 { background: #9c27b0; }

  /* Bracket */
  .bracket-wrap { overflow-x: auto; padding-bottom: 16px; }
  .bracket { display: flex; gap: 0; min-width: 900px; align-items: flex-start; }
  .bracket-round { display: flex; flex-direction: column; min-width: 155px; }
  .bracket-round-title { font-size: 11px; color: #e94560; text-align: center; padding: 6px 0 8px; font-weight: 600; }
  .bracket-match { background: #151525; border: 1px solid #222; border-radius: 6px; margin: 4px 6px; font-size: 11px; overflow: hidden; }
  .bracket-match.live { border-color: #4caf50; }
  .bracket-match.placeholder { opacity: 0.35; border-style: dashed; }
  .bm-team { display: flex; align-items: center; padding: 4px 6px; gap: 4px; }
  .bm-team:first-child { border-bottom: 1px solid #1a1a2e; }
  .bm-flag { font-size: 14px; line-height: 1; }
  .bm-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 11px; }
  .bm-score { font-weight: 700; font-size: 12px; min-width: 14px; text-align: right; }
  .bm-score.live-sc { color: #4caf50; }
  .bm-winner .bm-name { font-weight: 700; }
  .bm-loser { opacity: 0.45; }
  .bracket-spacer { flex: 1; min-height: 8px; }
  .bracket-connector { display: flex; flex-direction: column; justify-content: space-around; width: 12px; }

  @media (max-width: 600px) {
    .match-top { padding: 8px 10px; }
    .match-teams { font-size: 13px; }
    .pred { min-width: 55px; padding: 5px 2px; }
    .pred-name { font-size: 9px; }
    .pred-score { font-size: 11px; }
    .lb-header, .lb-row { grid-template-columns: 28px 1fr 36px 36px 36px 36px 46px; font-size: 10px; padding: 8px 10px; }
    .header h1 { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>ЧМ 2026 — Семейные прогнозы</h1>
  <p>3 — точный счёт · 2 — исход + разница · 1 — верный исход</p>
  <div class="status-bar">
    <span><span class="status-dot" id="api-dot"></span> <span id="api-status">Загрузка...</span></span>
    <span id="last-update"></span>
  </div>
</div>

<div class="container">
  <div class="tabs">
    <div class="tab active" onclick="showTab('current')">Текущие и предстоящие</div>
    <div class="tab" onclick="showTab('past')">Завершённые</div>
    <div class="tab" onclick="showTab('bracket')">Сетка</div>
    <div class="tab" onclick="showTab('leaderboard')">Таблица</div>
  </div>

  <div style="margin-bottom:12px">
    <select id="round-filter" onchange="render()" style="padding:6px 10px;border-radius:8px;border:1px solid #333;background:#0a0e1a;color:#fff;font-size:13px;">
      <option value="all" selected>Все раунды</option>
      <option value="1/16 финала">1/16 финала</option>
      <option value="1/8 финала">1/8 финала</option>
      <option value="Четвертьфинал">Четвертьфинал</option>
      <option value="Полуфинал">Полуфинал</option>
      <option value="Матч за 3-е место">Матч за 3-е место</option>
      <option value="Финал">Финал</option>
    </select>
  </div>

  <div id="panel-current" class="panel active"></div>
  <div id="panel-past" class="panel"></div>
  <div id="panel-bracket" class="panel"></div>
  <div id="panel-leaderboard" class="panel"></div>
</div>

<script>

// =============================================

const FLAGS = {
  'Mexico':'\u{1F1F2}\u{1F1FD}','South Africa':'\u{1F1FF}\u{1F1E6}','South Korea':'\u{1F1F0}\u{1F1F7}','Czech Republic':'\u{1F1E8}\u{1F1FF}',
  'United States':'\u{1F1FA}\u{1F1F8}','Paraguay':'\u{1F1F5}\u{1F1FE}','Haiti':'\u{1F1ED}\u{1F1F9}','Scotland':'\u{1F3F4}\u{E0067}\u{E0062}\u{E0073}\u{E0063}\u{E0074}\u{E007F}',
  'Australia':'\u{1F1E6}\u{1F1FA}','Turkey':'\u{1F1F9}\u{1F1F7}','Brazil':'\u{1F1E7}\u{1F1F7}','Japan':'\u{1F1EF}\u{1F1F5}',
  'Germany':'\u{1F1E9}\u{1F1EA}','Netherlands':'\u{1F1F3}\u{1F1F1}','Morocco':'\u{1F1F2}\u{1F1E6}','France':'\u{1F1EB}\u{1F1F7}',
  'Sweden':'\u{1F1F8}\u{1F1EA}','England':'\u{1F3F4}\u{E0067}\u{E0062}\u{E0065}\u{E006E}\u{E0067}\u{E007F}','DR Congo':'\u{1F1E8}\u{1F1E9}','Democratic Republic of the Congo':'\u{1F1E8}\u{1F1E9}',
  'Belgium':'\u{1F1E7}\u{1F1EA}','Senegal':'\u{1F1F8}\u{1F1F3}','Spain':'\u{1F1EA}\u{1F1F8}','Austria':'\u{1F1E6}\u{1F1F9}',
  'Portugal':'\u{1F1F5}\u{1F1F9}','Croatia':'\u{1F1ED}\u{1F1F7}','Switzerland':'\u{1F1E8}\u{1F1ED}','Algeria':'\u{1F1E9}\u{1F1FF}',
  'Egypt':'\u{1F1EA}\u{1F1EC}','Argentina':'\u{1F1E6}\u{1F1F7}','Cabo Verde':'\u{1F1E8}\u{1F1FB}','Cape Verde':'\u{1F1E8}\u{1F1FB}',
  'Colombia':'\u{1F1E8}\u{1F1F4}','Ghana':'\u{1F1EC}\u{1F1ED}','Canada':'\u{1F1E8}\u{1F1E6}','Ecuador':'\u{1F1EA}\u{1F1E8}',
  'Norway':'\u{1F1F3}\u{1F1F4}','Ivory Coast':'\u{1F1E8}\u{1F1EE}',"Côte d'Ivoire":'\u{1F1E8}\u{1F1EE}',"Cote d'Ivoire":'\u{1F1E8}\u{1F1EE}',
  'Bosnia and Herzegovina':'\u{1F1E7}\u{1F1E6}','Bosnia & Herzegovina':'\u{1F1E7}\u{1F1E6}',
  'Iran':'\u{1F1EE}\u{1F1F7}','Serbia':'\u{1F1F7}\u{1F1F8}','Denmark':'\u{1F1E9}\u{1F1F0}','Wales':'\u{1F3F4}\u{E0067}\u{E0062}\u{E0077}\u{E006C}\u{E0073}\u{E007F}',
  'Poland':'\u{1F1F5}\u{1F1F1}','Uruguay':'\u{1F1FA}\u{1F1FE}','Chile':'\u{1F1E8}\u{1F1F1}','Peru':'\u{1F1F5}\u{1F1EA}',
  'Nigeria':'\u{1F1F3}\u{1F1EC}','Cameroon':'\u{1F1E8}\u{1F1F2}','Tunisia':'\u{1F1F9}\u{1F1F3}',
  'Saudi Arabia':'\u{1F1F8}\u{1F1E6}','Qatar':'\u{1F1F6}\u{1F1E6}','Panama':'\u{1F1F5}\u{1F1E6}',
  'Italy':'\u{1F1EE}\u{1F1F9}','Romania':'\u{1F1F7}\u{1F1F4}','Greece':'\u{1F1EC}\u{1F1F7}',
  'Ukraine':'\u{1F1FA}\u{1F1E6}','Hungary':'\u{1F1ED}\u{1F1FA}','Georgia':'\u{1F1EC}\u{1F1EA}','Russia':'\u{1F1F7}\u{1F1FA}',
};
function flag(enName) { return FLAGS[enName]||''; }

const ROUND_MAP = {'r32':'1/16 финала','r16':'1/8 финала','qf':'Четвертьфинал','sf':'Полуфинал','third':'Матч за 3-е место','final':'Финал'};
const STADIUM_UTC = {'1':-5,'2':-5,'3':-5,'4':-5,'5':-5,'6':-5,'7':-4,'8':-4,'9':-4,'10':-4,'11':-4,'12':-4,'13':-7,'14':-7,'15':-7,'16':-7};

function tr(n) { return TEAM_RU[n]||n; }
function trL(l) { return l ? l.replace(/Winner Match (\d+)/,'Побед. м.$1').replace(/Loser Match (\d+)/,'Проигр. м.$1') : '?'; }

function toUTC(d, sid) {
  const m = d.match(/(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2})/);
  if (!m) return 0;
  return Date.UTC(+m[3],+m[1]-1,+m[2],+m[4]-(STADIUM_UTC[String(sid)]||-4),+m[5]);
}

function fmt(ms) {
  if (!ms) return '';
  const d = new Date(ms);
  const mo = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
  return d.getDate()+' '+mo[d.getMonth()]+', '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

function pts(ph,pa,ah,aa) {
  ph=+ph;pa=+pa;ah=+ah;aa=+aa;
  if ([ph,pa,ah,aa].some(isNaN)) return null;
  if (ph===ah&&pa===aa) return 3;
  const po=Math.sign(ph-pa), ao=Math.sign(ah-aa);
  if (po!==ao) return 0;
  if ((ph-pa)===(ah-aa)) return 2;
  return 1;
}

let matches = [], allKO = [];

function showTab(name) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}

function card(m) {
  const isLive = m.elapsed&&m.elapsed!=='notstarted'&&!m.finished;
  const hasScore = m.hScore!=null&&m.aScore!=null&&(isLive||m.finished);
  const pr = PREDICTIONS[m.id];

  let badge = '';
  if (isLive) badge = `<span class="live-badge">${m.elapsed}'</span>`;
  else if (m.finished) badge = `<span class="finished-badge">завершён</span>`;

  let sc = '<span class="vs">—</span>';
  if (hasScore) sc = `<span class="match-score${isLive?' live-score':''}">${m.hScore}:${m.aScore}</span>`;

  let h = `<div class="match ${isLive?'live':''} ${m.placeholder?'placeholder':''}">
    <div class="match-top">
      <div class="match-teams">${m.home} ${sc} ${m.away}</div>
      <div class="match-meta"><span>${fmt(m.utcMs)}</span>${badge}</div>
    </div>`;

  if (!m.placeholder) {
    h += `<div class="preds">`;
    PLAYERS.forEach((p,i) => {
      const pred = pr&&pr[p];
      let pt = null;
      if (pred&&hasScore&&m.finished) pt = pts(pred[0],pred[1],m.hScore,m.aScore);
      const ptH = pt!==null ? `<span class="pred-pts pts-${pt}">(${pt})</span>` : '';
      const sStr = pred ? `${pred[0]}:${pred[1]}` : '—';
      h += `<div class="pred"><div class="pred-name">${SHORT[i]}</div><span class="pred-score${pred?'':' pred-empty'}">${sStr}</span>${ptH}</div>`;
    });
    h += `</div>`;
  }
  return h + `</div>`;
}

function isToday(utcMs) {
  const now = new Date(), d = new Date(utcMs);
  return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth() && d.getDate()===now.getDate();
}

function render() {
  const rf = document.getElementById('round-filter').value;
  const filtered = matches.filter(m => rf==='all' || m.round===rf);
  const curMatches = filtered.filter(m => !m.finished || isToday(m.utcMs));
  const pastMatches = filtered.filter(m => m.finished && !isToday(m.utcMs)).slice().sort((a,b) => b.utcMs - a.utcMs);

  let cur='', cR='';
  curMatches.forEach(m => {
    if (m.round!==cR) { cR=m.round; cur+=`<div class="round-label">${m.round}</div>`; }
    cur += card(m);
  });

  let past='', pR='';
  pastMatches.forEach(m => {
    if (m.round!==pR) { pR=m.round; past+=`<div class="round-label">${m.round}</div>`; }
    past += card(m);
  });

  document.getElementById('panel-current').innerHTML = cur||'<p style="color:#666;text-align:center;padding:40px">Нет текущих матчей</p>';
  document.getElementById('panel-past').innerHTML = past||'<p style="color:#666;text-align:center;padding:40px">Нет завершённых матчей</p>';
  renderLB();
  renderBracket();
}

function renderLB() {
  const fin = matches.filter(m=>m.finished);
  const st = PLAYERS.map(p => {
    let t=0,e=0,d=0,o=0,w=0;
    fin.forEach(m => {
      const pr = PREDICTIONS[m.id]&&PREDICTIONS[m.id][p];
      if (!pr) return;
      const pt = pts(pr[0],pr[1],m.hScore,m.aScore);
      if(pt===3){e++;t+=3;}else if(pt===2){d++;t+=2;}else if(pt===1){o++;t+=1;}else if(pt===0){w++;}
    });
    return {name:SHORT[PLAYERS.indexOf(p)],t,e,d,o,w};
  }).sort((a,b)=>b.t-a.t||b.e-a.e);

  let h = `<div class="scoring-info">
    <span><span class="dot dot-3"></span>3 — точный счёт</span>
    <span><span class="dot dot-2"></span>2 — исход + разница</span>
    <span><span class="dot dot-1"></span>1 — верный исход</span>
  </div><div class="leaderboard">
  <div class="lb-header"><div>#</div><div>Игрок</div><div style="text-align:center">3</div><div style="text-align:center">2</div><div style="text-align:center">1</div><div style="text-align:center">0</div><div style="text-align:center">Итого</div></div>`;
  st.forEach((s,i) => {
    const rc = i===0?'gold':i===1?'silver':i===2?'bronze':'';
    h += `<div class="lb-row"><div class="lb-rank ${rc}">${i+1}</div><div class="lb-name">${s.name}</div><div class="lb-pts">${s.e}</div><div class="lb-pts">${s.d}</div><div class="lb-pts">${s.o}</div><div class="lb-pts">${s.w}</div><div class="lb-total">${s.t}</div></div>`;
  });
  document.getElementById('panel-leaderboard').innerHTML = h+'</div>';
}

// Bracket layout: two halves of the draw
const BRACKET_TOP = [['73','76'],['74','75'],['78','77'],['79','80']];
const BRACKET_BOT = [['81','82'],['83','84'],['85','86'],['87','88']];
const R16_TOP = ['89','90','91','92'];
const R16_BOT = ['93','94','95','96'];
const QF_TOP = ['97','99'];
const QF_BOT = ['98','100'];
const SF_IDS = ['101','102'];
const FINAL_ID = '104';
const THIRD_ID = '103';

function bmTeam(name, enName, score, isWinner, isLoser, isLive) {
  const f = flag(enName);
  const cls = isWinner?'bm-winner':isLoser?'bm-loser':'';
  const scCls = isLive?'live-sc':'';
  const sc = score!=null&&score!==''?`<span class="bm-score ${scCls}">${score}</span>`:'';
  return `<div class="bm-team ${cls}">${f?`<span class="bm-flag">${f}</span>`:''}<span class="bm-name">${name}</span>${sc}</div>`;
}

function bmCard(m) {
  if (!m) return '<div class="bracket-match placeholder"><div class="bm-team"><span class="bm-name">—</span></div><div class="bm-team"><span class="bm-name">—</span></div></div>';
  const isLive = m.elapsed&&m.elapsed!=='notstarted'&&!m.finished;
  const hasScore = m.hScore!=null&&m.aScore!=null&&(isLive||m.finished);
  const hWin = m.finished&&hasScore&&+m.hScore>+m.aScore;
  const aWin = m.finished&&hasScore&&+m.aScore>+m.hScore;
  const cls = m.placeholder?'placeholder':isLive?'live':'';
  return `<div class="bracket-match ${cls}">${bmTeam(m.home,m.homeEn,hasScore?m.hScore:null,hWin,aWin,isLive)}${bmTeam(m.away,m.awayEn,hasScore?m.aScore:null,aWin,hWin,isLive)}</div>`;
}

function getM(id) { return allKO.find(m=>String(m.id)===String(id)); }

function renderBracket() {
  function col(title, ids, spacing) {
    let h = `<div class="bracket-round"><div class="bracket-round-title">${title}</div>`;
    ids.forEach((id,i) => {
      if (spacing && i>0) h += `<div class="bracket-spacer" style="min-height:${spacing}px"></div>`;
      h += bmCard(getM(id));
    });
    return h+'</div>';
  }

  // Top half
  const r32Top = BRACKET_TOP.flat();
  const r32Bot = BRACKET_BOT.flat();

  let html = '<div class="bracket-wrap"><div class="bracket">';
  // R32
  html += col('1/16', r32Top.concat(r32Bot), 2);
  // R16
  html += col('1/8', R16_TOP.concat(R16_BOT), 40);
  // QF
  html += col('1/4', QF_TOP.concat(QF_BOT), 115);
  // SF
  html += col('1/2', SF_IDS, 250);
  // Final + 3rd
  html += `<div class="bracket-round" style="min-width:170px"><div class="bracket-round-title">Финал / 3-е место</div>`;
  html += bmCard(getM(FINAL_ID));
  html += `<div class="bracket-spacer" style="min-height:80px"></div>`;
  html += bmCard(getM(THIRD_ID));
  html += `</div>`;
  html += '</div></div>';

  document.getElementById('panel-bracket').innerHTML = html;
}

async function fetchAPI() {
  const dot=document.getElementById('api-dot'), st=document.getElementById('api-status'), up=document.getElementById('last-update');
  const px=[u=>u, u=>'https://corsproxy.io/?'+encodeURIComponent(u), u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u)];
  for (const p of px) {
    try {
      const r = await fetch(p('https://worldcup26.ir/get/games'),{signal:AbortSignal.timeout(8000)});
      if (!r.ok) continue;
      const d = await r.json();
      const g = Array.isArray(d)?d:(d.games||d.data||[]);
      if (!g.length) continue;
      allKO = g.filter(x=>ROUND_MAP[x.type]).map(x => {
        function realName(en,id) { return en&&!en.startsWith('Winner')&&!en.startsWith('Loser')&&!en.startsWith('TBD')&&id!=='0'&&id!==0; }
        const hReal = realName(x.home_team_name_en,x.home_team_id), aReal = realName(x.away_team_name_en,x.away_team_id);
        return {id:x.id||x._id, type:x.type, round:ROUND_MAP[x.type], home:hReal?tr(x.home_team_name_en):trL(x.home_team_label), away:aReal?tr(x.away_team_name_en):trL(x.away_team_label), homeEn:hReal?x.home_team_name_en:'', awayEn:aReal?x.away_team_name_en:'', utcMs:toUTC(x.local_date||'',x.stadium_id), hScore:x.home_score, aScore:x.away_score, finished:x.finished===true||x.finished==='TRUE'||x.finished==='true', elapsed:x.time_elapsed||'notstarted', placeholder:!hReal&&!aReal};
      });
      matches = allKO.slice().sort((a,b)=>a.utcMs-b.utcMs);
      dot.className='status-dot status-live'; up.textContent=fmt(Date.now());
      const hasLive = matches.some(m=>m.elapsed&&m.elapsed!=='notstarted'&&!m.finished);
      st.textContent = hasLive ? 'Live · авто-обновление' : 'Live';
      render();
      if (hasLive && !liveTimer) liveTimer = setInterval(fetchAPI, 60000);
      else if (!hasLive && liveTimer) { clearInterval(liveTimer); liveTimer = null; }
      return;
    } catch(e) {}
  }
  dot.className='status-dot status-off'; st.textContent='Офлайн';
}

let liveTimer = null;
fetchAPI();
</script>
</body>
</html>
